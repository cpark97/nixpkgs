name: Merge Upstream Branch

on:
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: "Upstream branch to merge"
        required: true
        type: choice
        options:
          - nixos-unstable

concurrency:
  group: merge-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run merge.sh
        env:
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
        run: bash merge.sh

      - name: Push changes
        run: git push origin "${{ inputs.upstream_branch }}"
